name: PEGO CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate PEGO framework
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run PEGO doctor
        run: python3 ops/pego_doctor.py

      - name: Validate system registry JSON
        run: python3 -m json.tool pego/system/registry.json > /dev/null

      - name: Verify protected private tracking boundary
        run: |
          test "$(git ls-files private)" = "private/README.md"

      - name: Run smoke tests
        run: python3 ops/run_smoke_tests.py
